<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Apple Style Gallery</title>
<link rel="stylesheet" href="gallery-apple.css" />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/page2.css">
</head>

<body>

<!-- HERO SLIDE -->
<section class="hero-slide">
  <div class="hero-slide-bg" style="background-image:url('https://placehold.co/2000x1200');"></div>
  <div class="hero-slide-content fade-slide">
    <h1>Designed with Intention</h1>
    <p>Where form, clarity, and emotion meet.</p>
  </div>
</section>

<!-- SPLIT HERO -->
<section class="split-hero fade-slide">
  <div class="split-text">
    <h2>Effortless Presence</h2>
    <p>Minimal expression. Maximum impact.</p>
  </div>
  <img src="https://placehold.co/1400x900" alt="Product Image">
</section>

<!-- PARALLAX FEATURE -->
<section class="parallax-section">
  <div class="parallax-image" style="background-image: url('https://placehold.co/2200x1400');"></div>
  <div class="parallax-content fade-slide">
    <h2>Depth in Motion</h2>
    <p>Subtle movement that feels natural and alive.</p>
  </div>
</section>

<!-- MOSAIC GRID -->
<section class="mosaic-grid fade-slide">
  <img src="https://placehold.co/900x900" alt="">
  <img src="https://placehold.co/900x900" alt="">
  <img src="https://placehold.co/900x900" alt="">
  <img src="https://placehold.co/900x900" alt="">
</section>

<script src="gallery-apple.js"></script>
</body>
</html>
