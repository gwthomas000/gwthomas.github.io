<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/style2.css">
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <!-- Navigation Bar Component Start -->
    <!-- UPDATED: Changed background from bg-white to bg-gray-900 (Black) -->
    <nav class="fixed top-0 left-0 w-full bg-black shadow-lg z-50">
        <div class="max-w-7xl mx-auto">
            <div class="flex justify-between items-center h-16">
                <!-- Logo/Brand Section -->
                <div class="flex-shrink-0 ">
                    <a href="#" class="text-2xl font-bold text-indigo-600 hover:text-indigo-800 transition duration-150">
                        <img src="images/prussia_flag.png" alt="prussia state flag" width="95" style="border-radius: 100%;">
                    </a>
                </div>

                <!-- Desktop Menu Links (Visible on Medium screens and up) -->
                <div class="hidden md:flex space-x-4">
                    <!-- UPDATED: Text color changed to text-white and hover states adjusted -->
                    <a href="index.html" class="text-white hover:bg-gray-700 hover:text-white px-3 py-2 rounded-full text-sm font-medium transition duration-150">Home</a>
                    <a href="timeline.html" class="text-white hover:bg-gray-700 hover:text-white px-3 py-2 rounded-full text-sm font-medium transition duration-150">Timeline</a>
                    <a href="historical-figures.html" class="text-white hover:bg-gray-700 hover:text-white px-3 py-2 rounded-full text-sm font-medium transition duration-150">Historical Figures</a>
                    <a href="detailed-dates.html" class="text-white hover:bg-gray-700 hover:text-white px-3 py-2 rounded-full text-sm font-medium transition duration-150">Significant Dates</a>
                    <a href="aftermath.html" class="text-white hover:bg-gray-700 hover:text-white px-3 py-2 rounded-full text-sm font-medium transition duration-150">Aftermath</a>
                    
                    <!-- Highlighted Link (Call-to-Action) - Retained original styling for contrast -->
                    <a href="about.html" class="px-3 py-2 rounded-full text-sm font-medium bg-[#de0000] text-white hover:bg-[#e35453] transition duration-150 shadow-md">
                        About
                    </a>
                </div>

                <!-- Mobile Menu Button (Hamburger Icon - Visible on Small screens) -->
                <div class="md:hidden">
                    <!-- UPDATED: Hamburger icon color changed to text-white and hover adjusted -->
                    <button id="mobile-menu-button" type="button" class="inline-flex items-center justify-center p-2 rounded-md text-white hover:text-white hover:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-inset focus:ring-white transition duration-150" aria-controls="mobile-menu" aria-expanded="false">
                        <span class="sr-only">Open main menu</span>
                        
                        <!-- Hamburger Icon (Open state) -->
                        <svg id="icon-open" class="block h-6 w-6" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                        </svg>
                        <!-- X Icon (Closed state) -->
                        <svg id="icon-close" class="hidden h-6 w-6" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- Mobile Menu (Hidden by default, toggled by JS) -->
        <div class="md:hidden" id="mobile-menu">
            <!-- UPDATED: Background changed to bg-gray-900 (Black) -->
            <div class="px-2 pt-2 pb-3 space-y-1 sm:px-3 text-center bg-black-000">
                <!-- UPDATED: Text color changed to text-white and hover states adjusted -->
                <a href="index.html" class="block text-base font-medium text-white hover:bg-gray-700 hover:text-white rounded-lg py-2 px-3 transition duration-150">Home</a>
                <a href="timeline.html" class="block text-base font-medium text-white hover:bg-gray-700 hover:text-white rounded-lg py-2 px-3 transition duration-150">Timeline</a>
                <a href="historical-figures.html" class="block text-base font-medium text-white hover:bg-gray-700 hover:text-white rounded-lg py-2 px-3 transition duration-150">Historical Figures</a>
                <a href="detailed-dates.html" class="block text-base font-medium text-white hover:bg-gray-700 hover:text-white rounded-lg py-2 px-3 transition duration-150">Significant Dates</a>
                <a href="aftermath.html" class="block text-base font-medium text-white hover:bg-gray-700 hover:text-white rounded-lg py-2 px-3 transition duration-150">Aftermath</a>
                
                <!-- Highlighted Link (Call-to-Action) -->
                <a href="about.html" class="block text-base font-medium mt-1 bg-[#de0000] text-white hover:bg-[#e35453] rounded-lg py-2 px-3 shadow-md transition duration-150">
                    About
                </a>
            </div>
        </div>
    </nav>
    <!-- Navigation Bar Component End -->

    <!-- Main Content Area -->
    <!-- (Your main content would go here, which is fine as-is) -->
    
    <!-- JavaScript for Mobile Menu Toggle -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const button = document.getElementById('mobile-menu-button');
            const menu = document.getElementById('mobile-menu');
            const iconOpen = document.getElementById('icon-open');
            const iconClose = document.getElementById('icon-close');

            // Start with the menu hidden
            menu.classList.add('hidden');
            iconOpen.classList.remove('hidden');
            iconClose.classList.add('hidden');

            button.addEventListener('click', () => {
                const isMenuOpen = menu.classList.contains('hidden');

                if (isMenuOpen) {
                    // Open the menu
                    menu.classList.remove('hidden');
                    iconOpen.classList.add('hidden');
                    iconClose.classList.remove('hidden');
                } else {
                    // Close the menu
                    menu.classList.add('hidden');
                    iconOpen.classList.remove('hidden');
                    iconClose.classList.add('hidden');
                }
            });
        });
    </script>
</body>
</html>
